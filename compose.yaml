# Dev-оточення месенджера. Загальні Laravel-змінні задаються тут (environment
# перекриває .env усередині контейнера), секрет APP_KEY береться з .env,
# який монтується разом із кодом.
# Ротація логів Docker (фаза B5): без ліміту json-file росте необмежено.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-laravel-env: &laravel-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8000
  FRONTEND_URL: http://localhost:5174
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: expedition_db
  DB_USERNAME: root
  DB_PASSWORD: secret
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SESSION_DRIVER: redis
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  BROADCAST_CONNECTION: reverb
  SESSION_DOMAIN: localhost
  SANCTUM_STATEFUL_DOMAINS: localhost:5173,localhost:5174,localhost:8000,127.0.0.1:5173,127.0.0.1:5174,127.0.0.1:8000
  REVERB_APP_ID: messenger
  REVERB_APP_KEY: messenger-local-key
  REVERB_APP_SECRET: messenger-local-secret
  # Хост, на який бекенд шле broadcast-події (сервіс reverb усередині мережі compose).
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http

x-app-base: &app-base
  build:
    context: ./docker/php
  volumes:
    - .:/var/www/html
  environment: *laravel-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  logging: *default-logging

services:
  app:
    <<: *app-base

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expedition_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    ports:
      # 5433 на хості, щоб не конфліктувати з локальним Postgres.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d expedition_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    ports:
      # 6380 на хості, щоб не конфліктувати з локальним Redis.
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  reverb:
    <<: *app-base
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    # Graceful restart при деплої: Reverb на SIGTERM перестає приймати нові
    # з'єднання й коректно закриває наявні; даємо йому час до SIGKILL.
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(str_contains(file_get_contents(\"http://127.0.0.1:8080/up\"), \"\") ? 0 : 1);' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue-worker:
    <<: *app-base
    command: php artisan queue:work redis --tries=3 --timeout=90
    restart: unless-stopped

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    logging: *default-logging

  # Щоденний бекап Postgres (фаза B5): pg_dump -Fc у named volume,
  # ретеншн 7 діб. Відновлення: pg_restore -d expedition_db <файл>.
  postgres-backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: root
      PGPASSWORD: secret
      PGDATABASE: expedition_db
    entrypoint: /bin/sh
    command: -c 'while true; do pg_dump -Fc -f "/backups/expedition-$$(date +%Y%m%d-%H%M%S).dump" && find /backups -name "*.dump" -mtime +7 -delete; sleep 86400; done'
    volumes:
      - postgres-backups:/backups
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  postgres-backups:
