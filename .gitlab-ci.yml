stages:
  - quality
  - test

variables:
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer-cache"

.php:
  image: php:8.4
  before_script:
    - apt-get update -qq && apt-get install -yqq --no-install-recommends git unzip libpq-dev libzip-dev > /dev/null
    - docker-php-ext-install -j"$(nproc)" pdo_pgsql zip > /dev/null
    - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --install-dir=/usr/local/bin --filename=composer --quiet
    - composer install --prefer-dist --no-progress --no-interaction
  cache:
    key: composer-php84
    paths:
      - .composer-cache/

pint:
  extends: .php
  stage: quality
  script:
    - vendor/bin/pint --test

phpstan:
  extends: .php
  stage: quality
  script:
    - vendor/bin/phpstan analyse --no-progress --memory-limit=1G

pest:
  extends: .php
  stage: test
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: excursion_db
    POSTGRES_USER: root
    POSTGRES_PASSWORD: secret
    APP_ENV: testing
    # Статичний ключ лише для тестового прогону в CI.
    APP_KEY: "base64:gPjcVpnN0LsmkmejwlFBA6rLKTfI1mE0yaMSe1PHpyg="
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_DATABASE: excursion_db
    DB_USERNAME: root
    DB_PASSWORD: secret
    REDIS_CLIENT: predis
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  script:
    - php artisan test --colors=never
